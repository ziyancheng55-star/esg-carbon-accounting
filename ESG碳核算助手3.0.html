<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESG碳核算助手 3.0 — 实时政策更新版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#27ae60;--primary-dark:#1e8449;--danger:#e74c3c;--warning:#f39c12;--info:#3498db;--sidebar-bg:#1a252f;--sidebar-width:200px;--bg:#f0f4f3;--card-bg:#fff;--text:#2c3e50;--text-light:#7f8c8d;--border:#dce4e2;--scope1:#e74c3c;--scope2:#f39c12;--scope3:#3498db}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-width);background:var(--sidebar-bg);color:#ecf0f1;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sidebar-header{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-header h2{font-size:15px;font-weight:700;color:#fff}
.sidebar-header .ver{font-size:10px;color:#2ecc71;margin-top:3px}
.sidebar-nav{flex:1;padding:4px 0}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 18px;cursor:pointer;color:#bdc3c7;transition:all 0.15s;border-left:3px solid transparent;font-size:13px}
.nav-item:hover{background:rgba(255,255,255,0.05);color:#fff}
.nav-item.active{background:rgba(39,174,96,0.2);color:#2ecc71;border-left-color:#2ecc71}
.nav-item .icon{font-size:16px;width:22px;text-align:center}
.nav-item .badge{background:#e74c3c;color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;margin-left:auto}
.project-switch{padding:10px 14px;border-top:1px solid rgba(255,255,255,0.1)}
.project-switch select{width:100%;padding:7px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:#2c3e50;color:#ecf0f1;font-size:11px}
.main{margin-left:var(--sidebar-width);flex:1;display:flex;flex-direction:column;min-height:100vh}
.header{background:var(--card-bg);padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:19px;font-weight:700;color:var(--primary-dark)}
.content{flex:1;padding:20px 28px;overflow-y:auto}
.card{background:var(--card-bg);border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text);padding-bottom:10px;border-bottom:2px solid var(--border)}
.kpi-row{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.kpi-card{flex:1;min-width:160px;background:var(--card-bg);border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border-left:4px solid var(--primary);display:flex;flex-direction:column;gap:4px}
.kpi-card.scope1{border-left-color:var(--scope1)}.kpi-card.scope2{border-left-color:var(--scope2)}.kpi-card.scope3{border-left-color:var(--scope3)}
.kpi-card .kpi-label{font-size:11px;color:var(--text-light);letter-spacing:0.5px}
.kpi-card .kpi-value{font-size:26px;font-weight:700;color:var(--text)}
.kpi-card .kpi-unit{font-size:11px;color:var(--text-light)}
.chart-row{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.chart-box{flex:1;min-width:340px;background:var(--card-bg);border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.chart-box .chart-title{font-size:13px;font-weight:700;margin-bottom:10px}
.chart-box canvas{max-height:280px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:3px;color:var(--text)}
.form-group input,.form-group select{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;transition:border-color 0.2s;font-family:inherit}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(39,174,96,0.1)}
.form-group input.error{border-color:var(--danger);background:#fdf2f2}
.form-row{display:flex;gap:14px}.form-row .form-group{flex:1}
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,0.12)}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-danger{background:var(--danger);color:#fff}.btn-info{background:var(--info);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:11px}.btn-group{display:flex;gap:7px;flex-wrap:wrap}
.steps{display:flex;margin-bottom:16px}
.step{flex:1;text-align:center;padding:10px 14px;background:var(--bg);border-bottom:3px solid var(--border);font-size:12px;font-weight:600;color:var(--text-light);cursor:pointer;transition:all 0.2s}
.step.active{border-bottom-color:var(--primary);color:var(--primary);background:#eafaf1}
.step .step-num{display:inline-block;width:22px;height:22px;line-height:22px;border-radius:50%;background:var(--border);color:#fff;margin-right:5px;font-size:11px}
.step.active .step-num{background:var(--primary)}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{background:var(--bg);font-weight:700;color:var(--text);position:sticky;top:0}
tr:hover{background:#f8faf9}
.table-wrap{max-height:380px;overflow-y:auto;border:1px solid var(--border);border-radius:8px}
.scope-group{border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.scope-group .scope-header{padding:12px 14px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px}
.scope-group .scope-header.scope1-h{background:#fdecea;color:var(--scope1)}
.scope-group .scope-header.scope2-h{background:#fef5e7;color:#d68910}
.scope-group .scope-header.scope3-h{background:#eaf2f8;color:var(--scope3)}
.scope-group .scope-body{padding:10px 14px}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:7px}
.alert-warning{background:#fef9e7;border:1px solid #f9e79f;color:#7d6608}
.alert-danger{background:#fdedec;border:1px solid #f5b7b1;color:#922b21}
.alert-info{background:#eaf2f8;border:1px solid #aed6f1;color:#1a5276}
.alert-success{background:#eafaf1;border:1px solid #a9dfbf;color:#145a32}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card-bg);border-radius:16px;padding:28px;max-width:580px;width:90%;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal h3{font-size:17px;margin-bottom:18px;color:var(--primary-dark)}
.tooltip{position:relative;display:inline-block;cursor:help;color:var(--info);font-weight:700;margin-left:3px}
.tooltip .tooltip-text{visibility:hidden;width:260px;background:#2c3e50;color:#fff;text-align:left;border-radius:8px;padding:10px 12px;position:fixed;z-index:9999;font-size:11px;font-weight:400;line-height:1.5;opacity:0;transition:opacity 0.15s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.tooltip:hover .tooltip-text{visibility:visible;opacity:1}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-light)}
.empty-state .empty-icon{font-size:56px;margin-bottom:14px}
.empty-state h3{font-size:17px;margin-bottom:7px;color:var(--text)}
.match-card{border:2px dashed var(--primary);background:#eafaf1;border-radius:12px;padding:14px;margin-bottom:14px}
.match-card h4{color:var(--primary-dark);margin-bottom:6px;font-size:13px}
.match-tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;margin:3px}
.match-tag.recommend{background:var(--primary);color:#fff}
.match-tag.focus{background:#fef9e7;color:#7d6608;border:1px solid #f9e79f}
.formula-toggle{cursor:pointer;color:var(--info);font-size:11px;text-decoration:underline}
.formula-detail{display:none;font-size:11px;color:var(--text-light);margin-top:3px;padding:5px 9px;background:var(--bg);border-radius:6px;font-family:monospace}
.formula-detail.show{display:block}
.update-badge{display:inline-block;background:#e74c3c;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.template-card{border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.2s}
.template-card:hover{border-color:var(--primary);background:#eafaf1;transform:translateY(-2px)}
.template-card h4{font-size:13px;margin-bottom:5px}
.template-card p{font-size:11px;color:var(--text-light)}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.tag-new{background:#e74c3c;color:#fff}.tag-updated{background:#f39c12;color:#fff}.tag-active{background:var(--primary);color:#fff}
@media(max-width:768px){.sidebar{width:55px}.sidebar .nav-item span,.sidebar-header h2,.sidebar-header .ver{display:none}.sidebar .nav-item{justify-content:center;padding:10px 0}.main{margin-left:55px}.content{padding:14px}.kpi-row,.chart-row,.form-row{flex-direction:column}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-header">
    <h2>🌱 ESG碳核算助手</h2>
    <div class="ver">v3.0 · 实时政策更新</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-page="project"><span class="icon">📋</span><span>项目管理</span></div>
    <div class="nav-item" data-page="data"><span class="icon">📝</span><span>数据录入</span></div>
    <div class="nav-item" data-page="result"><span class="icon">📊</span><span>核算结果</span></div>
    <div class="nav-item" data-page="compare"><span class="icon">📈</span><span>同比对比</span></div>
    <div class="nav-item" data-page="factor"><span class="icon">🔬</span><span>排放因子库</span></div>
    <div class="nav-item" data-page="policy"><span class="icon">🔄</span><span>政策更新</span><span class="badge" id="updateBadge" style="display:none">新</span></div>
    <div class="nav-item" data-page="audit"><span class="icon">📜</span><span>审计日志</span></div>
  </nav>
  <div class="project-switch">
    <select id="projectSelect" onchange="onProjectSwitch()"><option value="">📌 选择当前项目...</option></select>
  </div>
</aside>
<div class="main">
  <div class="header">
    <h1 id="pageTitle">项目管理</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="updateStatus" style="font-size:11px;color:var(--text-light)"></span>
      <span id="currentProjectBadge" style="font-size:12px;color:var(--text-light)">未选择项目</span>
    </div>
  </div>
  <div class="content" id="pageContent"></div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBox"></div></div>

<script>
// =============================================
// 数据层
// =============================================
const LS_KEY = 'esg_carbon_3_0';
const UPDATE_URL = 'https://gist.githubusercontent.com/anonymous/esg-factors/raw/main/factors_v3.json';

function loadStore(){
  try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):defaultStore()}catch(e){return defaultStore()}
}
function defaultStore(){
  return{
    projects:[],activityData:{},auditLogs:[],snapshots:{},
    updateHistory:[],factorVersions:[],
    settings:{tutorialShown:false,lastProjectId:null,autoCheckUpdate:true,updateUrl:UPDATE_URL,lastCheckTime:null}
  }
}
function saveStore(s){localStorage.setItem(LS_KEY,JSON.stringify(s))}
let STORE=loadStore();

function addLog(pid,action,entity,key,oldV,newV){
  STORE.auditLogs.push({projectId:pid,action,entity,key,oldVal:String(oldV||''),newVal:String(newV||''),time:new Date().toISOString()});
  if(STORE.auditLogs.length>500)STORE.auditLogs=STORE.auditLogs.slice(-500);
  saveStore(STORE)
}

// =============================================
// 排放因子库
// =============================================
const FUEL_DENSITY={gasoline:0.74,diesel:0.84,lpg:0.54};
const FUEL_FACTOR_TON={coal:1.900,coke:2.860,lpg:3.101,gasoline:2.925,diesel:3.096};
const GAS_FACTOR=2.162;
const HEAT_FACTOR=0.11,STEAM_TO_GJ=2.7;
const ELECTRICITY_GRID_FACTORS={'全国平均':0.5703,'华北':0.5768,'东北':0.5568,'华东':0.5568,'华中':0.5257,'西北':0.4405,'南方':0.4035,'西南':0.2258,'西藏':0.0234};
const SCOPE3_FACTORS={business_travel:0.00018,employee_commute:0.00015,upstream_transport:0.00010,waste:0.50};

const EMISSION_SOURCES=[
  {key:'coal',name:'原煤',scope:'Scope 1',category:'固定燃烧',unit:'吨',desc:'锅炉、窑炉等固定设施燃煤消耗量',stds:['GHG','ISO','国标']},
  {key:'coke',name:'焦炭',scope:'Scope 1',category:'固定燃烧',unit:'吨',desc:'高炉、化产等焦炭消耗量',stds:['GHG','ISO','国标']},
  {key:'natural_gas',name:'天然气',scope:'Scope 1',category:'固定燃烧',unit:'m³',desc:'锅炉、燃气轮机等天然气消耗量',stds:['GHG','ISO','国标']},
  {key:'lpg',name:'液化石油气',scope:'Scope 1',category:'固定燃烧',unit:'吨',desc:'液化石油气消耗量',stds:['GHG','ISO','国标']},
  {key:'gasoline_stationary',name:'汽油(固定源)',scope:'Scope 1',category:'固定燃烧',unit:'L',desc:'固定设施汽油消耗量',stds:['GHG','ISO','国标']},
  {key:'diesel_stationary',name:'柴油(固定源)',scope:'Scope 1',category:'固定燃烧',unit:'L',desc:'固定设施柴油消耗量',stds:['GHG','ISO','国标']},
  {key:'gasoline_mobile',name:'汽油(移动源)',scope:'Scope 1',category:'移动燃烧',unit:'L',desc:'公务用车、叉车等汽油消耗量',stds:['GHG','ISO','国标']},
  {key:'diesel_mobile',name:'柴油(移动源)',scope:'Scope 1',category:'移动燃烧',unit:'L',desc:'货车、工程机械等柴油消耗量',stds:['GHG','ISO','国标']},
  {key:'process_co2',name:'工业过程CO₂',scope:'Scope 1',category:'工业过程',unit:'吨',desc:'碳酸盐分解、发酵等工艺过程排放',stds:['GHG','ISO','国标']},
  {key:'electricity',name:'外购电力',scope:'Scope 2',category:'净购电力',unit:'kWh',desc:'电费单总用电量',stds:['GHG','ISO','国标']},
  {key:'heat',name:'外购热力',scope:'Scope 2',category:'净购热力',unit:'GJ',desc:'外购蒸汽/热水等热力',stds:['GHG','ISO','国标']},
  {key:'steam',name:'外购蒸汽',scope:'Scope 2',category:'净购热力',unit:'吨',desc:'外购蒸汽按质量吨计',stds:['GHG','ISO','国标']},
  {key:'business_travel',name:'员工差旅(航空)',scope:'Scope 3',category:'差旅',unit:'人·公里',desc:'员工因公航空出行总里程',stds:['GHG','ISO','国标']},
  {key:'employee_commute',name:'员工通勤',scope:'Scope 3',category:'通勤',unit:'人·公里',desc:'员工上下班通勤总里程',stds:['GHG','ISO','国标']},
  {key:'upstream_transport',name:'上游运输',scope:'Scope 3',category:'运输',unit:'吨·公里',desc:'原材料进厂运输周转量',stds:['GHG','ISO','国标']},
  {key:'waste',name:'固废处理',scope:'Scope 3',category:'废弃物',unit:'吨',desc:'工业固废、生活垃圾处理量',stds:['GHG','ISO','国标']},
];

const INDUSTRY_MATCH={
  '制造业':{std:'国标',focus:['electricity','coal','natural_gas'],grid:'华东'},
  '化工':{std:'GHG',focus:['process_co2','electricity','steam','coal'],grid:'华东'},
  '能源':{std:'ISO',focus:['coal','coke','electricity','diesel_mobile'],grid:'华北'},
  '交通/物流':{std:'GHG',focus:['gasoline_mobile','diesel_mobile','electricity'],grid:'全国平均'},
  '建筑/地产':{std:'国标',focus:['electricity','natural_gas','diesel_stationary'],grid:'全国平均'},
  '信息技术':{std:'GHG',focus:['electricity','business_travel','employee_commute'],grid:'全国平均'},
  '通用':{std:'GHG',focus:['electricity','natural_gas','coal','gasoline_mobile'],grid:'全国平均'}
};
const INDUSTRY_LIST=Object.keys(INDUSTRY_MATCH);
const GRID_LIST=Object.keys(ELECTRICITY_GRID_FACTORS);

// 行业预设数据模板
const INDUSTRY_TEMPLATES={
  '制造业':{electricity:5000000,natural_gas:80000,coal:200,gasoline_mobile:15000,diesel_mobile:50000,heat:2000,steam:500,business_travel:200000,employee_commute:500000,upstream_transport:100000,waste:300},
  '化工':{electricity:8000000,natural_gas:200000,coal:500,process_co2:1000,steam:2000,heat:5000,diesel_mobile:30000,waste:500},
  '交通/物流':{diesel_mobile:500000,gasoline_mobile:100000,electricity:500000,upstream_transport:500000},
  '信息技术':{electricity:2000000,business_travel:500000,employee_commute:300000,waste:50},
  '建筑/地产':{electricity:1000000,natural_gas:20000,diesel_stationary:50000,heat:1000,waste:200},
  '通用':{electricity:1000000,natural_gas:30000,coal:100,gasoline_mobile:5000,diesel_mobile:10000}
};

// =============================================
// 计算引擎
// =============================================
function calcEmission(key,value,gridRegion){
  if(value<=0)return{emission:0,formula:''};
  const region=key==='electricity'?(gridRegion||'全国平均'):'';
  if(key==='coal'){const e=value*FUEL_FACTOR_TON.coal;return{emission:e,formula:`${value}吨 × 1.900 = ${e.toFixed(4)} tCO₂e`}}
  if(key==='coke'){const e=value*FUEL_FACTOR_TON.coke;return{emission:e,formula:`${value}吨 × 2.860 = ${e.toFixed(4)} tCO₂e`}}
  if(key==='lpg'){const e=value*FUEL_FACTOR_TON.lpg;return{emission:e,formula:`${value}吨 × 3.101 = ${e.toFixed(4)} tCO₂e`}}
  if(key==='natural_gas'){const e=value*GAS_FACTOR/10000;return{emission:e,formula:`${value}m³ × 2.162÷10000 = ${e.toFixed(4)} tCO₂e`}}
  if(key==='gasoline_stationary'||key==='gasoline_mobile'){const e=value*FUEL_FACTOR_TON.gasoline*FUEL_DENSITY.gasoline/1000;return{emission:e,formula:`${value}L × 0.74kg/L÷1000×2.925 = ${e.toFixed(4)} tCO₂e`}}
  if(key==='diesel_stationary'||key==='diesel_mobile'){const e=value*FUEL_FACTOR_TON.diesel*FUEL_DENSITY.diesel/1000;return{emission:e,formula:`${value}L × 0.84kg/L÷1000×3.096 = ${e.toFixed(4)} tCO₂e`}}
  if(key==='process_co2')return{emission:value,formula:`${value}吨CO₂（直接排放）`};
  if(key==='electricity'){const gf=ELECTRICITY_GRID_FACTORS[region]||ELECTRICITY_GRID_FACTORS['全国平均'];const e=value*gf/1000;return{emission:e,formula:`${value}kWh × ${gf}g/kWh÷1000 = ${e.toFixed(4)} tCO₂e`}}
  if(key==='heat'){const e=value*HEAT_FACTOR;return{emission:e,formula:`${value}GJ × 0.11 = ${e.toFixed(4)} tCO₂e`}}
  if(key==='steam'){const e=value*HEAT_FACTOR*STEAM_TO_GJ;return{emission:e,formula:`${value}吨 × 2.7GJ/t×0.11 = ${e.toFixed(4)} tCO₂e`}}
  if(SCOPE3_FACTORS[key]!==undefined){const f=SCOPE3_FACTORS[key];return{emission:value*f,formula:`${value} × ${f} = ${(value*f).toFixed(4)} tCO₂e`}}
  return{emission:0,formula:'未知'};
}

function calculateProject(pid){
  const p=STORE.projects.find(x=>x.id===pid);if(!p)return null;
  const data=STORE.activityData[pid]||{},grid=p.gridRegion||'全国平均',std=p.standard||'GHG';
  const details=[],scopeTotals={'Scope 1':0,'Scope 2':0,'Scope 3':0},catTotals={};let total=0;
  const srcs=EMISSION_SOURCES.filter(s=>s.stds.includes(std));
  for(const src of srcs){
    const val=parseFloat(data[src.key])||0,{emission,formula}=calcEmission(src.key,val,grid);
    details.push({key:src.key,name:src.name,scope:src.scope,category:src.category,unit:src.unit,value:val,emission,formula});
    scopeTotals[src.scope]=(scopeTotals[src.scope]||0)+emission;
    catTotals[src.category]=(catTotals[src.category]||0)+emission;
    total+=emission;
  }
  details.forEach(d=>d.pct=total>0?(d.emission/total*100):0);
  return{total,scopeTotals,categoryTotals:catTotals,details};
}

function validateData(pid){
  const data=STORE.activityData[pid]||{},issues=[];
  const hasCore=['electricity','natural_gas','coal','diesel_mobile','gasoline_mobile'].some(k=>(parseFloat(data[k])||0)>0);
  if(!hasCore)issues.push({level:'error',msg:'请至少填写一项核心能耗数据'});
  const r=calculateProject(pid);
  if(r&&r.total>10000)issues.push({level:'warning',msg:'⚠️ 年度排放量超过1万吨，建议核实数据或关注碳交易履约义务'});
  const hasS3=['business_travel','employee_commute','upstream_transport','waste'].some(k=>(parseFloat(data[k])||0)>0);
  if(!hasS3&&hasCore)issues.push({level:'info',msg:'未填写范围三数据，完整披露建议补充'});
  return issues;
}

// =============================================
async function checkPolicyUpdate(silent=false){
  const url=STORE.settings.updateUrl||UPDATE_URL;
  document.getElementById('updateStatus').textContent='检查更新中...';
  try{
    const resp=await fetch(url,{method:'GET',cache:'no-cache',signal:AbortSignal.timeout(8000)});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    const latestVer=data.version||'';
    const currentVer=STORE.factorVersions.length>0?STORE.factorVersions[0].version:'';
    if(latestVer&&latestVer!==currentVer){
      STORE.settings.lastCheckTime=new Date().toISOString();saveStore(STORE);
      document.getElementById('updateStatus').innerHTML=`<span class="update-badge">有新版本: ${latestVer}</span>`;
      document.getElementById('updateBadge').style.display='inline';
      if(!silent){showUpdateAvailableModal(data)}}
    else{
      STORE.settings.lastCheckTime=new Date().toISOString();saveStore(STORE);
      document.getElementById('updateStatus').textContent='已是最新 ✓';
      document.getElementById('updateBadge').style.display='none';
      if(!silent){showToast('✅ 排放因子已是最新版本')}}
  }catch(e){
    document.getElementById('updateStatus').textContent=silent?'':'离线模式';
    if(!silent){showToast('⚠️ 无法连接更新服务器，使用本地因子库')}
  }
}

function applyPolicyUpdate(data){
  const version=data.version||'unknown';
  const factors=data.factors||[];
  const desc=data.description||'';
  // 应用新因子到内存（这里更新内置常量）
  if(data.gridFactors){Object.assign(ELECTRICITY_GRID_FACTORS,data.gridFactors)}
  if(data.fuelFactors){Object.assign(FUEL_FACTOR_TON,data.fuelFactors)}
  if(data.scope3Factors){Object.assign(SCOPE3_FACTORS,data.scope3Factors)}
  // 记录更新历史
  STORE.factorVersions.unshift({version,description:desc,factorCount:factors.length,time:new Date().toISOString(),source:data.source||'remote'});
  if(STORE.factorVersions.length>50)STORE.factorVersions=STORE.factorVersions.slice(0,50);
  STORE.settings.lastCheckTime=new Date().toISOString();
  saveStore(STORE);
  addLog(null,'政策更新','policy',version,'',desc);
  document.getElementById('updateBadge').style.display='none';
  document.getElementById('updateStatus').textContent=`已更新至 ${version} ✓`;
  showToast(`✅ 已更新 ${factors.length} 条排放因子至版本 ${version}`);
}

function showUpdateAvailableModal(data){
  const version=data.version||'?';
  const desc=data.description||'新版本排放因子可用';
  const count=(data.factors||[]).length;
  showModal(`
    <h3>🔄 发现政策更新</h3>
    <div class="alert alert-info">检测到新版本排放因子：<b>${version}</b></div>
    <p style="line-height:1.8;font-size:13px">${desc}</p>
    <p style="font-size:12px;color:var(--text-light);margin-top:8px">包含 <b>${count}</b> 条因子更新</p>
    <div class="btn-group" style="justify-content:flex-end;margin-top:20px">
      <button class="btn btn-outline" onclick="closeModal()">稍后提醒</button>
      <button class="btn btn-primary" onclick="applyPolicyUpdate(${JSON.stringify(data).replace(/"/g,'&quot;')});closeModal();if(currentPage==='policy')renderPage()">立即更新</button>
    </div>`);
}

function createSnapshot(){
  if(!currentProjectId)return;const r=calculateProject(currentProjectId);if(!r)return;
  const name='V_'+new Date().toISOString().replace(/[-:T]/g,'').substring(0,15);
  if(!STORE.snapshots[currentProjectId])STORE.snapshots[currentProjectId]=[];
  STORE.snapshots[currentProjectId].unshift({name,data:{calcResult:r},time:new Date().toISOString()});
  addLog(currentProjectId,'创建快照','snapshot',name,'','');saveStore(STORE);showToast('✅ 快照 '+name+' 已生成');
}

function exportExcel(){
  if(!currentProjectId)return;const p=getProject(currentProjectId),r=calculateProject(currentProjectId);if(!r)return;
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['ESG碳核算助手3.0 报告'],[],['项目',p.name],['企业',p.companyName],['年度',p.accountingYear],['标准',getStdLabel(p.standard)],['电网',p.gridRegion],['行业',p.industry||'通用'],[],['生成时间',new Date().toLocaleString()]]),'项目信息');
  const ir=[['排放源','范围','分类','单位','数据']];r.details.forEach(d=>ir.push([d.name,d.scope,d.category,d.unit,d.value]));XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ir),'活动数据');
  const fr=[['排放源','因子','单位','来源']];const g=p.gridRegion||'全国平均';fr.push(['电力',ELECTRICITY_GRID_FACTORS[g]||0.5703,'gCO₂/kWh',`生态环境部${g}电网`]);fr.push(['天然气',GAS_FACTOR/10000,'tCO₂/m³','GB/T 32150']);fr.push(['原煤',1.900,'tCO₂/t','发改委']);fr.push(['汽油',2.925,'tCO₂/t','GB/T 32150']);fr.push(['柴油',3.096,'tCO₂/t','GB/T 32150']);XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(fr),'排放因子');
  const cr=[['排放源','范围','数据','单位','公式','排放(tCO₂e)','占比']];r.details.filter(d=>d.emission>0.0001).forEach(d=>cr.push([d.name,d.scope,d.value,d.unit,d.formula,d.emission.toFixed(4),d.pct.toFixed(2)+'%']));XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cr),'计算过程');
  const sr=[['汇总','值','单位']];sr.push(['总排放',r.total.toFixed(4),'tCO₂e']);for(const[s,v]of Object.entries(r.scopeTotals))sr.push([s,v.toFixed(4),`tCO₂e（${r.total>0?(v/r.total*100).toFixed(2):0}%）`]);XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sr),'结果汇总');
  const lr=[['时间','操作','对象','旧值','新值']];STORE.auditLogs.filter(l=>l.projectId===currentProjectId).slice(-200).forEach(l=>lr.push([(l.time||'').substring(0,19),l.action,l.key,l.oldVal,l.newVal]));XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(lr),'审计日志');
  const fn=`碳排放报告_${p.name}_${new Date().toISOString().substring(0,10)}.xlsx`;
  XLSX.writeFile(wb,fn);addLog(currentProjectId,'导出Excel','export',fn,'','');saveStore(STORE);showToast('✅ 已导出：'+fn);
}

function renderComparePage(){
  document.getElementById('pageContent').innerHTML=`

function selectAllProjects(){document.querySelectorAll('.cmpChk').forEach(c=>c.checked=true)}
function clearCompare(){document.querySelectorAll('.cmpChk').forEach(c=>c.checked=false);document.getElementById('compareResults').innerHTML=''}
function doCompare(){
  const ids=[...document.querySelectorAll('.cmpChk:checked')].map(c=>parseInt(c.value));
  if(ids.length<2){showToast('请至少选择2个项目进行对比');return}
  const results=ids.map(id=>{const p=getProject(id),r=calculateProject(id);return{name:p.name,year:p.accountingYear,total:r?r.total:0,scope1:r?r.scopeTotals['Scope 1']||0:0,scope2:r?r.scopeTotals['Scope 2']||0:0,scope3:r?r.scopeTotals['Scope 3']||0:0}}).filter(r=>r.total>0);
  if(results.length<2){document.getElementById('compareResults').innerHTML='<div class="alert alert-warning">至少2个项目需要有排放数据</div>';return}
  let tableRows=results.map((r,i)=>{const maxT=Math.max(...results.map(x=>x.total));return`<tr><td><b>${esc(r.name)}</b></td><td>${r.year}</td><td><b>${r.total.toFixed(2)}</b></td><td>${r.scope1.toFixed(2)}</td><td>${r.scope2.toFixed(2)}</td><td>${r.scope3.toFixed(2)}</td><td><div style="background:var(--primary);height:18px;width:${maxT>0?r.total/maxT*200:0}px;border-radius:4px"></div></td></tr>`}).join('');
  document.getElementById('compareResults').innerHTML=`
    <div class="card"><div class="card-title">对比结果</div><div class="table-wrap"><table><thead><tr><th>项目</th><th>年度</th><th>总排放(tCO₂e)</th><th>范围一</th><th>范围二</th><th>范围三</th><th>可视化</th></tr></thead><tbody>${tableRows}</tbody></table></div></div>
    <div class="chart-row"><div class="chart-box"><div class="chart-title">📊 排放量对比</div><canvas id="compareBarChart"></canvas></div><div class="chart-box"><div class="chart-title">🍩 范围结构对比</div><canvas id="compareStackChart"></canvas></div></div>`;
  setTimeout(()=>{
    const bc=document.getElementById('compareBarChart'),sc=document.getElementById('compareStackChart');
    if(bc)new Chart(bc,{type:'bar',data:{labels:results.map(r=>r.name+'\n('+r.year+')'),datasets:[{label:'范围一',data:results.map(r=>r.scope1),backgroundColor:'#e74c3c'},{label:'范围二',data:results.map(r=>r.scope2),backgroundColor:'#f39c12'},{label:'范围三',data:results.map(r=>r.scope3),backgroundColor:'#3498db'}]},options:{responsive:true,scales:{x:{stacked:true},y:{stacked:true}},plugins:{legend:{position:'bottom'}}}});
    if(sc)new Chart(sc,{type:'doughnut',data:{labels:results.map(r=>r.name),datasets:[{data:results.map(r=>r.total),backgroundColor:['#3498db','#e74c3c','#2ecc71','#f39c12','#9b59b6','#1abc9c']}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});
  },100);
}

function showUpdateConfigModal(){
  showModal(`
    <h3>⚙ 配置更新源</h3>
    <div class="form-group"><label>远程更新URL</label><input id="updateUrl" value="${esc(STORE.settings.updateUrl||UPDATE_URL)}" placeholder="输入JSON更新源URL"></div>
    <div class="form-group"><label><input type="checkbox" id="autoCheck" ${STORE.settings.autoCheckUpdate?'checked':''}> 启动时自动检查更新</label></div>
    <div class="btn-group" style="justify-content:flex-end;margin-top:14px"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveUpdateConfig()">保存</button></div>`);
}
function saveUpdateConfig(){
  STORE.settings.updateUrl=document.getElementById('updateUrl').value.trim();
  STORE.settings.autoCheckUpdate=document.getElementById('autoCheck').checked;
  saveStore(STORE);closeModal();showToast('✅ 配置已保存');
}
function importLocalUpdateFile(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{const data=JSON.parse(ev.target.result);applyPolicyUpdate(data);if(currentPage==='policy')renderPage()}catch(err){showToast('❌ 文件解析失败：'+err.message)}
    };reader.readAsText(file);
  };input.click();
}

// =============================================
// 通用工具
// =============================================
function showModal(h){document.getElementById('modalBox').innerHTML=h;document.getElementById('modalOverlay').classList.add('show')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
function showToast(msg){
  let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:30px;right:30px;background:#2c3e50;color:#fff;padding:12px 24px;border-radius:8px;font-size:13px;z-index:9999;transition:all 0.3s;opacity:0;transform:translateY(20px)';document.body.appendChild(t)}
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateY(0)';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(20px)'},2500);
}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

// Tooltip定位
function initTooltips(){
  document.querySelectorAll('.tooltip').forEach(tip=>{tip.addEventListener('mouseenter',function(){const box=tip.querySelector('.tooltip-text');if(!box)return;const r=tip.getBoundingClientRect();let l=r.right+8,t=r.top-10;if(l+270>window.innerWidth)l=r.left-270;if(l<210)l=210;if(t<10)t=r.bottom+5;if(t+80>window.innerHeight)t=window.innerHeight-85;box.style.left=l+'px';box.style.top=t+'px'})});
}

// 渲染调度
function renderPage(){
  updateHeader();setTimeout(initTooltips,50);
  switch(currentPage){
    case'project':renderProjectPage();break;case'data':renderDataEntryPage();break;
    case'result':renderResultPage();break;case'compare':renderComparePage();break;
    case'factor':renderFactorPage();break;case'policy':renderPolicyPage();break;
    case'audit':renderAuditPage();break;default:renderProjectPage();
  }
}

function finishTutorial(){STORE.settings.tutorialShown=true;saveStore(STORE);closeModal()}

  document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click',()=>navigate(el.dataset.page)));

  updateHeader();renderPage();
  if(!STORE.settings.tutorialShown)setTimeout(()=>showTutorial(0),600);
  // 自动检查政策更新
  if(STORE.settings.autoCheckUpdate!==false){
    document.getElementById('updateStatus').textContent='正在检查更新...';
    setTimeout(()=>checkPolicyUpdate(true),2000);
  }
}
document.addEventListener('DOMContentLoaded',init);
